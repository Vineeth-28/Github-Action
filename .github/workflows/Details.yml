name: Hello Workflow

on:
  push:
    branches:
      - main

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Say hello
        run: echo "Hello Everyone"

      - name: Say hello username
        run: echo "Hello $USER"

  details:
    runs-on: ubuntu-latest

    steps:
      - name: Version of Python and Docker
        run: docker --version && python3 --version
